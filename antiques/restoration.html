<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalyn's Treasures</title>
    <script>
        function handleView() {
            const path = window.location.pathname;
            const small = window.innerWidth <= 1100;
            if (small && path.includes("restoration")) { window.location.replace(path.replace("restoration", "mobile")); }
            if (!small && path.includes("mobile")) { window.location.replace(path.replace("mobile", "restoration")); }
        }
        handleView();
        window.addEventListener("resize", handleView);
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="header-art">
        <h1 class="site-title">Kalyn's Treasures</h1>
        <nav class="nav-ribbon">
            <a href="./index.html">Main Page</a>
            <a href="#">Show and Tell</a>
            <a href="#">Mock-Antique</a>
        </nav>
    </header>
    <main class="content-frame">
        <h2>Respectful Restorations</h2>
        <section class="gallery">
            <div class="gallery-item">
                <a href="./restoration/rolltop-desk/rolltop-desk.html">
                    <img src="./restoration/rolltop-desk/after/after (18).jpg" class="thumbnail" alt="Restoration Work">
                    <h3>Victorian Roll Top Desk</h3>
                </a>
                <img class="item-divider" src="images/divider.gif" alt="">
            </div>
            <div class="gallery-item">
                <a href="./restoration/steamer-trunk/steamer-trunk.html">
                    <img src="./restoration/steamer-trunk/after/after.jpg" class="thumbnail"
                        alt="1890 - 1915 Steamer Trunk">
                    <h3>1890 - 1915 Steamer Trunk</h3>
                </a>
                <img class="item-divider" src="images/divider.gif" alt="">
            </div>
            <div class="gallery-item">
                <a href="./restoration/dresser/dresser.html">

                </a>
                <img class="item-divider" src="images/divider.gif" class="thumbnail" alt="">
            </div>
            <div class="gallery-item">
                <a href="./restoration/carved-chair/carved-chair.html">

                <img class="item-divider" src="images/divider.gif" alt="">
            </div>
        </section>
    </main>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Curious Notice</title>
    <script>
        function handleView() {
            const path = window.location.pathname;
            const small = window.innerWidth <= 768;
            if (small && path.includes("index")) { window.location.replace(path.replace("index", "mobile")); }
            if (small && path.includes("restoration")) { window.location.replace(path.replace("restoration", "mobile")); }
            if (!small && path.includes("mobile")) { window.location.replace(path.replace("mobile", "index")); }
        }
        handleView();
        window.addEventListener("resize", handleView);
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2b1d14;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.04), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03), transparent 40%);
            color: #f2e6c9;
            font-family: "Cinzel", serif;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 6px double #c8a96a;
            border-radius: 12px;
            background: #3a271c;
            box-shadow:
                0 0 40px rgba(0, 0, 0, 0.7),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .container::before,
        .container::after {
            content: "✦";
            font-size: 30px;
            position: absolute;
            color: #c8a96a;
        }

        .container::before {
            top: 10px;
            left: 15px;
        }

        .container::after {
            bottom: 10px;
            right: 15px;
        }

        h1 {
            font-family: "IM Fell English SC", serif;
            letter-spacing: 2px;
            font-size: 28px;
            margin-bottom: 25px;
            color: #e6c88a;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed #c8a96a;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .small {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>A Curious Notice</h1>

        <p>
            Esteemed traveler of the modern web,
        </p>

        <div class="instructions">
            To view this site on mobile, click the 3 dots on the upper right corner of your browser and select
            <strong>"View on Desktop."</strong>
        </div>

        <div class="small">
            Your cooperation is most appreciated.
        </div>

    </div>

</body>

</html>

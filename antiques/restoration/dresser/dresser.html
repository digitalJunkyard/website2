    <script>
        function handleView() {
            const path = window.location.pathname;
            const small = window.innerWidth <= 1100;
            if (small && path.includes("restoration")) { window.location.replace(path.replace("restoration", "mobile")); }
            if (!small && path.includes("mobile")) { window.location.replace(path.replace("mobile", "restoration")); }
        }
        handleView();
        window.addEventListener("resize", handleView);
    </script>
